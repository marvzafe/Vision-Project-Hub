<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabaseUrl = 'https://uhldzpysjvetanhskvch.supabase.co';
  const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'; 
  const supabase = createClient(supabaseUrl, supabaseKey);

  const form = document.querySelector('form');
  const submitBtn = document.querySelector('.btn-primary');
  const departmentSelect = document.getElementById('department_id');

  // --- NEW: Fetch departments from the database to populate the dropdown ---
  async function loadDepartments() {
    // Note: Change 'name' below if your department table uses a different column name (like 'department_name' or 'title')
    const { data: departments, error } = await supabase
      .from('department') // Your department table name
      .select('department_id, name'); 

    if (error) {
      console.error("Error loading departments:", error);
      departmentSelect.innerHTML = '<option value="" disabled selected>Error loading departments</option>';
      return;
    }

    // Clear the loading text and populate options
    departmentSelect.innerHTML = '<option value="" disabled selected>Select a department...</option>';
    departments.forEach(dept => {
      const option = document.createElement('option');
      option.value = dept.department_id; // This is the ID that will be saved to the users table
      option.textContent = dept.name;    // This is the text the user sees
      departmentSelect.appendChild(option);
    });
  }

  // Run the fetch function as soon as the script loads
  loadDepartments();

  // --- EXISTING: Form Submit Handler ---
  form.addEventListener('submit', async (e) => {
    e.preventDefault(); 
    
    submitBtn.textContent = 'Processing...';
    submitBtn.disabled = true;

    const formData = new FormData(form);
    let avatarUrl = null;

    try {
      const file = formData.get('profilePicture');
      
      if (file && file.size > 0) {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}_${Math.random().toString(36).substring(2)}.${fileExt}`;
        
        const { error: uploadError } = await supabase.storage
          .from('avatars') 
          .upload(fileName, file);

        if (uploadError) throw uploadError;

        const { data } = supabase.storage.from('avatars').getPublicUrl(fileName);
        avatarUrl = data.publicUrl;
      }

      // We are now inserting 'department_id' instead of the old 'department' string
      const { error: insertError } = await supabase
        .from('users') 
        .insert([
          { 
            first_name: formData.get('firstName'),
            middle_name: formData.get('middleName'),
            last_name: formData.get('lastName'),
            email: formData.get('email'),
            phone: formData.get('phone'),
            department_id: formData.get('department_id'), // <-- Updated line
            profile_picture_url: avatarUrl 
          }
        ]);

      if (insertError) throw insertError;

      alert('Member registered successfully!');
      form.reset();
      
    } catch (error) {
      console.error("Error during registration:", error);
      alert("An error occurred: " + error.message);
    } finally {
      submitBtn.textContent = 'Register Member';
      submitBtn.disabled = false;
    }
  });
</script>
