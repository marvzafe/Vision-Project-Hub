<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Project | CRM</title>
    <link rel="stylesheet" href="global.css"> 
    <link rel="stylesheet" href="project-create.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;"><a href="index.html">← Back to Dashboard</a></p>
                <h1 class="title">Create New Project</h1>
            </div>
            <div>
                <span class="badge progress">Draft</span>
            </div>
        </header>

        <form action="#" method="POST">
            <div class="details-grid">
                
                <div class="left-col">
                    
                    <div class="card">
                        <h2 class="card-title">General Information</h2>
                        
                        <div class="form-group">
                            <label class="form-label">Project Name</label>
                            <input type="text" class="form-control" placeholder="e.g., Vision HQ Extension" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Location</label>
                                <input type="text" class="form-control" placeholder="e.g., Taytay, Rizal" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Area / Size</label>
                                <input type="text" class="form-control" placeholder="e.g., 1,200 sq meters">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Project Description</label>
                            <textarea class="form-control" placeholder="Provide a comprehensive overview of the project scope..."></textarea>
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Technical Requirements</label>
                            <textarea class="form-control" placeholder="List specific engineering, architectural, or structural requirements..."></textarea>
                        </div>
                    </div>

                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                            <h2 class="card-title" style="border: none; margin: 0; padding: 0;">Timeline & Milestones</h2>
                            <button type="button" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">+ Add Milestone</button>
                        </div>
                        
                        <div id="milestone-container">
                            <div class="milestone-row">
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Milestone Name</label>
                                    <input type="text" class="form-control" value="Site Preparation & Clearing">
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Start Date</label>
                                    <input type="date" class="form-control">
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">End Date</label>
                                    <input type="date" class="form-control">
                                </div>
                                <button type="button" class="btn-icon">✖</button>
                            </div>

                            <div class="milestone-row">
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Milestone Name</label>
                                    <input type="text" class="form-control" placeholder="e.g., Foundation Pouring">
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">Start Date</label>
                                    <input type="date" class="form-control">
                                </div>
                                <div class="form-group" style="margin-bottom: 0;">
                                    <label class="form-label">End Date</label>
                                    <input type="date" class="form-control">
                                </div>
                                <button type="button" class="btn-icon">✖</button>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="right-col">
                    
                    <div class="card">
                        <h2 class="card-title">Project Media & Files</h2>
                        
                        <div class="form-group">
                            <label class="form-label">Project Cover Picture</label>
                            <div class="upload-area">
                                <div class="upload-icon">📸</div>
                                <p style="font-weight: 600; margin-bottom: 0.25rem;">Click to upload image</p>
                                <p style="font-size: 0.8rem; color: var(--text-muted);">JPG, PNG up to 5MB</p>
                                <input type="file" style="display: none;" accept="image/*">
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <label class="form-label">Attachments (Blueprints, Contracts)</label>
                            <div class="upload-area" style="padding: 1.5rem;">
                                <div class="upload-icon" style="font-size: 1.5rem;">📎</div>
                                <p style="font-size: 0.85rem; font-weight: 600;">Drop files here or click to browse</p>
                                <input type="file" style="display: none;" multiple>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                            <h2 class="card-title" style="border: none; margin: 0; padding: 0;">Project Team</h2>
                            <button type="button" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">+ Add Member</button>
                        </div>

                        <div class="form-group" style="background-color: var(--bg-color); padding: 1rem; border-radius: 6px;">
                            <label class="form-label" style="font-size: 0.8rem;">Role</label>
                            <select class="form-control" style="margin-bottom: 0.5rem;">
                                <option>Project Lead</option>
                                <option>Head Engineer</option>
                                <option>Lead Architect</option>
                                <option>Supplier</option>
                            </select>
                            
                            <label class="form-label" style="font-size: 0.8rem;">Assignee Name</label>
                            <input type="text" class="form-control" value="Marv J.">
                        </div>

                        <div class="form-group" style="background-color: var(--bg-color); padding: 1rem; border-radius: 6px; margin-bottom: 0;">
                            <label class="form-label" style="font-size: 0.8rem;">Role</label>
                            <select class="form-control" style="margin-bottom: 0.5rem;">
                                <option>Project Lead</option>
                                <option>Head Engineer</option>
                                <option>Lead Architect</option>
                                <option selected>Supplier</option>
                            </select>
                            
                            <label class="form-label" style="font-size: 0.8rem;">Assignee Name</label>
                            <input type="text" class="form-control" placeholder="e.g., TechBuild Corp">
                        </div>
                    </div>

                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-outline" onclick="window.location.href='index.html'">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Project</button>
            </div>
        </form>
    </div>
</body>
</html>
